version: "3.9"

services:

  backend:
    build: .
    container_name: concert_backend
    ports:
      - "5000:5000"
    depends_on:
      - mysql
      - mongo
    environment:
      SQLALCHEMY_DATABASE_URI: mysql+pymysql://user:password@mysql:3306/concert_db
      MONGO_URI: mongodb://mongo:27017/concert_db
      JWT_SECRET_KEY: supersecretkey
    volumes:
      - ./backend:/app
    restart: always

  mysql:
    image: mysql:8
    container_name: concert_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: concert_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"

  mongo:
    image: mongo:7
    container_name: concert_mongo
    ports:
      - "27018:27017"